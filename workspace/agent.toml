[agent]
id = "default"
orchestrator = "builtin.max"
memory = "memory.in_memory"
max_turns = 32

[policy]
default = "deny"

[memory]
backend = "sqlite"
default_domain = "general"
hydration_enabled = true
hydrate_max_fragments = 5
hydrate_max_estimated_tokens = 1200
hydrate_stores = ["semantic", "episodic"]
episode_recording_enabled = true
semantic_backend = "sqlite_vec"  # aliases: "sqlite_vec", "qdrant", "none"

[memory.sqlite_vec]
table = "memory_records_vec"
vector_dimensions = 384

[memory.retention]
max_records = 10000

[memory.policy]
writes = "ask_user"
forgets = "ask_user"
shared_writes = false

[[memory.shared_domains]]
name = "agentos"
read = true
write = false

[channels.tui]
enabled = true
mode = "interactive"

[channels.telegram]
enabled = false
mode = "poll_once"

[channels.feishu]
enabled = false
mode = "long_connection"

[isolation]
worker_path_env = "AGENTOS_TOOL_WORKER_PATH"

[resources]
priority = ["skills", "tools", "mcp", "llm"]

[resources.skills]
enabled = ["skill-creator", "web-research", "audit-skill"]

[resources.tools]
enabled = ["file", "http", "memory", "shell", "skill_validate", "cron_create", "cron_list", "cron_remove"]

[resources.mcp]
enabled = ["remote_echo"]

[resources.llm]
enabled = ["llm"]

[task_workspace]
root = "tasks"

[[mcp_servers]]
id = "static-mcp"
endpoint = "static://local"
timeout_ms = 10000

[[mcp_tools]]
server_id = "static-mcp"
name = "remote_echo"
description = "Static MCP-backed echo tool"
response = "static MCP response"

[[routing.rules]]
domain = "software_dev"
description = "Implementation, debugging, submitted issue fixes, regressions, tests, architecture, code review, and repository maintenance."
examples = [
  "fix this failing test",
  "fix the bug described in this issue",
  "implement the orchestrator plan",
  "review the TUI code path",
]
dispatch = "escalate"
template = "software-dev"

[[routing.rules]]
domain = "skill_ops"
description = "Authoring, editing, or rebuilding a skill bundle: modifying a workspace/skills/<name>/SKILL.md or its scripts and then validating the bundle. Distinct from general code fixes."
examples = [
  "update the audit skill",
  "rebuild the audit-skill SKILL.md",
  "edit the skill-creator skill bundle",
  "fix the audit skill and revalidate it",
]
dispatch = "delegate"
agent_id = "skill-editor-subagent"
policy_id = "skill-edit"

[[routing.rules]]
domain = "content_ops"
description = "Content planning, publishing, campaigns, editorial workflows, and content operations."
examples = [
  "draft a campaign plan",
  "prepare this post for publishing",
]
dispatch = "escalate"
template = "content-ops"

[[routing.rules]]
domain = "research"
description = "Investigation, source review, evidence gathering, comparison, and synthesis."
examples = [
  "compare these sources",
  "investigate the latest implementation options",
]
dispatch = "escalate"
template = "research"

[[routing.rules]]
domain = "editing"
description = "Rewrite, proofread, copy edit, clarify, or improve existing prose without changing the underlying task."
examples = [
  "rewrite this message",
  "proofread this section",
]
dispatch = "delegate"
agent_id = "edit-subagent"
policy_id = "edit"

[routing.fallback]
domain = "general"
description = "General chat and unclassified prompts that do not clearly match a specialized route."
examples = [
  "answer this general question",
  "help me think through this",
]
dispatch = "direct"
